name: Build & Release Firmware

on:
  push:
    tags:
      - 'v*.*.*'   # Triggered by tags like v0.1.0, v1.2.3

permissions:
  contents: write  # Required to create GitHub Releases

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ----------------------------------------------------------------
      - name: Install PlatformIO
        run: pip install platformio

      # ----------------------------------------------------------------
      - name: Build firmware (production env)
        run: pio run -e esp32s3-weather

      # ----------------------------------------------------------------
      - name: Locate firmware binary
        id: find_bin
        run: |
          BIN=$(find .pio/build/esp32s3-weather -name "firmware.bin" | head -1)
          echo "path=$BIN" >> "$GITHUB_OUTPUT"
          echo "Found binary: $BIN"

      # ----------------------------------------------------------------
      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the section between this tag and the previous one
          SECTION=$(awk "/^## \[${TAG#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SECTION" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: |
            ${{ steps.find_bin.outputs.path }}

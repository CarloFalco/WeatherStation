[wifi]
ssid     = 
password = 


[mqtt]
host       = 
port       = 1883
user       = 
password   = 
client_id  = weather-station-01
base_topic = weather/station01

[ota]
; GitHub repository in the form "username/repo-name"
github_repo  = CarloFalco/WeatherStation
; Personal Access Token – leave empty for public repositories
github_token =

[sampling]
; All values are in seconds.
; Minimum recommended values are noted in parentheses.
bme280_s  = 60    ; BME280 temperature / humidity / pressure  (min: 5)
rain_s    = 60    ; Rain-gauge accumulation window             (min: 10)
wind_s    = 10    ; Anemometer + wind-direction sample         (min: 5)
pm25_s    = 120   ; PM2.5 sensor read interval                 (min: 10)
ccs811_s  = 120   ; CCS811 eCO2 / TVOC read interval           (min: 10)
mics_s    = 120   ; MICS6814 gas-sensor read interval          (min: 10)
ina_s     = 60    ; INA3221 voltage/current read interval      (min: 5)

; How often aggregated data is published to the MQTT broker
publish_s = 300

; Deep-sleep duration between active wake cycles (set to 0 to disable)
sleep_s   = 300

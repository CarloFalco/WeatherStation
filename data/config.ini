; WeatherStation V2 - runtime configuration
; Edit and re-upload with 'pio run -t uploadfs', or let the
; firmware regenerate this file with defaults if deleted.

[station]
id = ws-01
wake_interval_s = 600

[rain]
; Rainfall per bucket tip [mm] = bucket volume / collector area
; = 3 cm3 / 63.25 cm2 (11.5 x 5.5 cm) = 0.4743 mm
mm_per_pulse = 0.4743

[lora]
freq_mhz = 868.1
bw_khz = 125.0
sf = 7
cr = 5
tx_power_dbm = 14
sync_word = 0x12

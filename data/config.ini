; WeatherStation V2 - runtime configuration
; Edit and re-upload with 'pio run -t uploadfs', or let the
; firmware regenerate this file with defaults if deleted.

[station]
id = ws-01
wake_interval_s = 600

[rain]
; Rainfall per bucket tip [mm] = bucket volume / collector area
; = 3 cm3 / 63.25 cm2 (11.5 x 5.5 cm) = 0.4743 mm
mm_per_pulse = 0.4743

[wind]
; Wind speed per pulse frequency [m/s per Hz]. Default is the common cup
; anemometer convention "1 Hz = 2.4 km/h" = 0.667 m/s per Hz: replace with
; the real datasheet value of the installed anemometer.
mps_per_hz = 0.667
; Wind sampling window per measurement cycle [s].
sample_window_s = 5
; Added to the AS5600 raw angle to align 0 to North. Field calibration:
; point the vane North, read the raw angle on serial, set 360 - raw.
vane_offset_deg = 0

[lora]
freq_mhz = 868.1
bw_khz = 125.0
sf = 7
cr = 5
tx_power_dbm = 14
sync_word = 0x12

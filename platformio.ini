; ============================================================================
; WeatherStation V2 - PlatformIO project configuration
;
; Target: ESP32-S3 Dev Module + SX1276 868 MHz LoRa module
; Framework: Arduino
;
; Module: ESP32-S3-WROOM-1-N16R8 (16MB QIO flash, 8MB OPI PSRAM).
; PSRAM is intentionally left disabled: not needed by the firmware and it
; would only increase power consumption on a battery-powered node.
; ============================================================================

[platformio]
default_envs = station

; Shared base for the ESP32-S3 firmware environments. The two envs differ
; only in CORE_DEBUG_LEVEL: "station" (development) keeps the debug dumps
; and the USB enumeration wait, "station-release" (production/CI release)
; strips log_d/log_i from the binary and boots without serial waits.
[esp32s3_base]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash / partitions -----------------------------------------------------
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; --- Serial monitor ---------------------------------------------------------
; esp32_exception_decoder turns Guru Meditation backtraces into file:line,
; time prefixes every line with a timestamp.
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; --- Build flags ------------------------------------------------------------
build_flags =
    -Wall

; --- Libraries --------------------------------------------------------------
lib_deps =
    bblanchon/ArduinoJson@^7.4.1
    adafruit/Adafruit BME280 Library@^2.2.4
    jgromes/RadioLib@^7.2.1

; --- Development build (default) ---------------------------------------------
; CORE_DEBUG_LEVEL gates the log_e/log_w/log_i/log_d macros AT COMPILE TIME:
; 4 = debug (sensor readings dumped on serial), 2 = warn (log_d/log_i code
; stripped from the binary). main.cpp also keys the USB enumeration wait
; on this level.
[env:station]
extends = esp32s3_base
build_flags =
    ${esp32s3_base.build_flags}
    -DCORE_DEBUG_LEVEL=4

; --- Production build (CI releases, field deployment) --------------------------
[env:station-release]
extends = esp32s3_base
build_flags =
    ${esp32s3_base.build_flags}
    -DCORE_DEBUG_LEVEL=2

; ============================================================================
; Host-native environment: unit tests for the pure logic in src/logic/
; (no Arduino headers there, by project rule). Run with: pio test -e native
; ============================================================================
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<logic/>
build_flags =
    -std=c++17
    -DUNIT_TEST

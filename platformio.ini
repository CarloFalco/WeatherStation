; ============================================================================
; WeatherStation V2 - PlatformIO project configuration
;
; Target: ESP32-S3 Dev Module + SX1276 868 MHz LoRa module
; Framework: Arduino
;
; Module: ESP32-S3-WROOM-1-N16R8 (16MB QIO flash, 8MB OPI PSRAM).
; PSRAM is intentionally left disabled: not needed by the firmware and it
; would only increase power consumption on a battery-powered node.
; ============================================================================

[platformio]
default_envs = station

[env:station]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash / partitions -----------------------------------------------------
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; --- Serial monitor ---------------------------------------------------------
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; --- Build flags ------------------------------------------------------------
; CORE_DEBUG_LEVEL gates the log_e/log_w/log_i/log_d macros AT COMPILE TIME:
; 4 = debug (development: sensor readings dumped on serial), 3 = info,
; 2 = warn (production: all log_d/log_i code stripped from the binary).
build_flags =
    -DCORE_DEBUG_LEVEL=4
    -Wall

; --- Libraries --------------------------------------------------------------
lib_deps =
    bblanchon/ArduinoJson@^7.4.1
    adafruit/Adafruit BME280 Library@^2.2.4
    jgromes/RadioLib@^7.2.1

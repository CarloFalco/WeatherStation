; ============================================================================
; WeatherStation V2 - PlatformIO project configuration
;
; Target: ESP32-S3 Dev Module + SX1276 868 MHz LoRa module
; Framework: Arduino
;
; NOTE: flash size is conservatively set to 4MB so the same image works on
; any ESP32-S3 module (N4/N8/N16). If the actual module has more flash,
; the partition table can be enlarged later (see partitions.csv).
; ============================================================================

[platformio]
default_envs = station

[env:station]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash / partitions -----------------------------------------------------
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; --- Serial monitor ---------------------------------------------------------
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; --- Build flags ------------------------------------------------------------
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -Wall

; --- Libraries --------------------------------------------------------------
; Added incrementally as modules are implemented (RadioLib, ArduinoJson, ...)
lib_deps =

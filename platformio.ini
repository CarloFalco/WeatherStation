; =============================================================================
; ESP32-S3 Weather Station – PlatformIO configuration (modulare e funzionante)
; =============================================================================

[platformio]
default_envs = esp32s3-weather-debug

[common]
platform  = espressif32
framework = arduino
build_flags =
    -DCORE_DEBUG_LEVEL=3

board_build.filesystem = littlefs

lib_deps =
    bblanchon/ArduinoJson            @ ^7.1.0
    knolleary/PubSubClient           @ ^2.8.0
    adafruit/Adafruit BME280 Library @ ^2.3.0
    adafruit/Adafruit CCS811 Library @ ^1.1.3
    adafruit/Adafruit PM25 AQI Sensor@ ^1.0.6
    adafruit/Adafruit INA3221 Library@ ^1.0.1
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    robtillaart/AS5600               @ ^0.6.0

monitor_speed = 115200
upload_speed  = 921600

; =============================================================================
; Production environment
; =============================================================================
[env:esp32s3-weather]
platform  = ${common.platform}
framework = ${common.framework}
board     = esp32-s3-devkitc-1

board_build.filesystem = littlefs

build_flags =
    ${common.build_flags}
    -DENV_PRODUCTION

lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}

; Post-build: version.txt + versioned .bin + PDF documentation
; Declared once here in each env (NOT in [common]) to avoid double execution
extra_scripts = post:post_build.py


; =============================================================================
; Debug environment
; =============================================================================
[env:esp32s3-weather-debug]
platform  = ${common.platform}
framework = ${common.framework}
board     = esp32-s3-devkitc-1

board_build.filesystem = littlefs

build_flags =
    ${common.build_flags}
    -DENV_DEBUG
    -DDEBUG_SKIP_DEEP_SLEEP
    -DCORE_DEBUG_LEVEL=5

lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}

extra_scripts = post:post_build.py